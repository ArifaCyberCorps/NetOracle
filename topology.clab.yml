name: netoracle-sdwan
mgmt:
  network: clab
  ipv4-subnet: 192.168.100.0/24
topology:
  kinds:
    linux:
      image: ubuntu:22.04

  nodes:
    # ============ P ROUTERS (MPLS Core) ============
    dc1-p1:
      kind: linux
      image: quay.io/frrouting/frr:9.1.0
      mgmt-ipv4: 192.168.100.10
      binds:
        - configs/dc1-p1/frr.conf:/etc/frr/frr.conf
        - configs/dc1-p1/daemons:/etc/frr/daemons

    dc2-p1:
      kind: linux
      image: quay.io/frrouting/frr:9.1.0
      mgmt-ipv4: 192.168.100.11
      binds:
        - configs/dc2-p1/frr.conf:/etc/frr/frr.conf
        - configs/dc2-p1/daemons:/etc/frr/daemons

    hub-p1:
      kind: linux
      image: quay.io/frrouting/frr:9.1.0
      mgmt-ipv4: 192.168.100.12
      binds:
        - configs/hub-p1/frr.conf:/etc/frr/frr.conf
        - configs/hub-p1/daemons:/etc/frr/daemons

    # ============ PE ROUTERS (MPLS Edge) ============
    dc1-pe1:
      kind: linux
      image: quay.io/frrouting/frr:9.1.0
      mgmt-ipv4: 192.168.100.20
      binds:
        - configs/dc1-pe1/frr.conf:/etc/frr/frr.conf
        - configs/dc1-pe1/daemons:/etc/frr/daemons

    dc2-pe1:
      kind: linux
      image: quay.io/frrouting/frr:9.1.0
      mgmt-ipv4: 192.168.100.21
      binds:
        - configs/dc2-pe1/frr.conf:/etc/frr/frr.conf
        - configs/dc2-pe1/daemons:/etc/frr/daemons

    hub-pe1:
      kind: linux
      image: quay.io/frrouting/frr:9.1.0
      mgmt-ipv4: 192.168.100.22
      binds:
        - configs/hub-pe1/frr.conf:/etc/frr/frr.conf
        - configs/hub-pe1/daemons:/etc/frr/daemons

    # ============ CE ROUTERS (Customer Edge / SD-WAN Overlay) ============
    # Uses custom netoracle/ce-ipsec image with strongSwan pre-installed for IPsec VTI tunnels
    # Overlay: hub-ce1 (AS 65503) is route-reflector with VTI to all 8 spoke CEs
    #          dc2-ce1 ↔ branch5-ce1 have an additional direct VTI peering
    dc1-ce1:
      kind: linux
      image: netoracle/ce-ipsec:9.1
      mgmt-ipv4: 192.168.100.30
      binds:
        - configs/dc1-ce1/frr.conf:/etc/frr/frr.conf
        - configs/dc1-ce1/daemons:/etc/frr/daemons
      exec:
        - setup_ipsec.sh

    dc2-ce1:
      kind: linux
      image: netoracle/ce-ipsec:9.1
      mgmt-ipv4: 192.168.100.31
      binds:
        - configs/dc2-ce1/frr.conf:/etc/frr/frr.conf
        - configs/dc2-ce1/daemons:/etc/frr/daemons
      exec:
        - setup_ipsec.sh

    hub-ce1:
      kind: linux
      image: netoracle/ce-ipsec:9.1
      mgmt-ipv4: 192.168.100.32
      binds:
        - configs/hub-ce1/frr.conf:/etc/frr/frr.conf
        - configs/hub-ce1/daemons:/etc/frr/daemons
      exec:
        - setup_ipsec.sh

    branch1-ce1:
      kind: linux
      image: netoracle/ce-ipsec:9.1
      mgmt-ipv4: 192.168.100.33
      binds:
        - configs/branch1-ce1/frr.conf:/etc/frr/frr.conf
        - configs/branch1-ce1/daemons:/etc/frr/daemons
      exec:
        - setup_ipsec.sh

    branch2-ce1:
      kind: linux
      image: netoracle/ce-ipsec:9.1
      mgmt-ipv4: 192.168.100.34
      binds:
        - configs/branch2-ce1/frr.conf:/etc/frr/frr.conf
        - configs/branch2-ce1/daemons:/etc/frr/daemons
      exec:
        - setup_ipsec.sh

    branch3-ce1:
      kind: linux
      image: netoracle/ce-ipsec:9.1
      mgmt-ipv4: 192.168.100.35
      binds:
        - configs/branch3-ce1/frr.conf:/etc/frr/frr.conf
        - configs/branch3-ce1/daemons:/etc/frr/daemons
      exec:
        - setup_ipsec.sh

    branch4-ce1:
      kind: linux
      image: netoracle/ce-ipsec:9.1
      mgmt-ipv4: 192.168.100.36
      binds:
        - configs/branch4-ce1/frr.conf:/etc/frr/frr.conf
        - configs/branch4-ce1/daemons:/etc/frr/daemons
      exec:
        - setup_ipsec.sh

    branch5-ce1:
      kind: linux
      image: netoracle/ce-ipsec:9.1
      mgmt-ipv4: 192.168.100.37
      binds:
        - configs/branch5-ce1/frr.conf:/etc/frr/frr.conf
        - configs/branch5-ce1/daemons:/etc/frr/daemons
      exec:
        - setup_ipsec.sh

    branch6-ce1:
      kind: linux
      image: netoracle/ce-ipsec:9.1
      mgmt-ipv4: 192.168.100.38
      binds:
        - configs/branch6-ce1/frr.conf:/etc/frr/frr.conf
        - configs/branch6-ce1/daemons:/etc/frr/daemons
      exec:
        - setup_ipsec.sh

    # ============ TRAFFIC GENERATOR HOSTS ============
    dc1-host:
      kind: linux
      image: netoracle/host:9.1
      mgmt-ipv4: 192.168.100.50
      exec:
        - echo "dc1-host ready" > /tmp/ready

    dc2-host:
      kind: linux
      image: netoracle/host:9.1
      mgmt-ipv4: 192.168.100.51
      exec:
        - echo "dc2-host ready" > /tmp/ready

    hub-host:
      kind: linux
      image: netoracle/host:9.1
      mgmt-ipv4: 192.168.100.52
      exec:
        - echo "hub-host ready" > /tmp/ready

    branch1-host:
      kind: linux
      image: netoracle/host:9.1
      mgmt-ipv4: 192.168.100.53
      exec:
        - echo "branch1-host ready" > /tmp/ready

    branch2-host:
      kind: linux
      image: netoracle/host:9.1
      mgmt-ipv4: 192.168.100.54
      exec:
        - echo "branch2-host ready" > /tmp/ready

    branch3-host:
      kind: linux
      image: netoracle/host:9.1
      mgmt-ipv4: 192.168.100.55
      exec:
        - echo "branch3-host ready" > /tmp/ready

    branch4-host:
      kind: linux
      image: netoracle/host:9.1
      mgmt-ipv4: 192.168.100.56
      exec:
        - echo "branch4-host ready" > /tmp/ready

    branch5-host:
      kind: linux
      image: netoracle/host:9.1
      mgmt-ipv4: 192.168.100.57
      exec:
        - echo "branch5-host ready" > /tmp/ready

    branch6-host:
      kind: linux
      image: netoracle/host:9.1
      mgmt-ipv4: 192.168.100.58
      exec:
        - echo "branch6-host ready" > /tmp/ready

  links:
    # ============ CORE P-TO-P LINKS ============
    - endpoints: ["dc1-p1:eth1", "dc2-p1:eth1"]
    - endpoints: ["dc1-p1:eth2", "hub-p1:eth1"]
    - endpoints: ["dc2-p1:eth2", "hub-p1:eth2"]

    # ============ PE-TO-P LINKS ============
    - endpoints: ["dc1-pe1:eth1", "dc1-p1:eth3"]
    - endpoints: ["dc2-pe1:eth1", "dc2-p1:eth3"]
    - endpoints: ["hub-pe1:eth1", "hub-p1:eth3"]

    # ============ CE-TO-PE LINKS ============
    - endpoints: ["dc1-ce1:eth1", "dc1-pe1:eth2"]
    - endpoints: ["dc2-ce1:eth1", "dc2-pe1:eth2"]
    - endpoints: ["hub-ce1:eth1", "hub-pe1:eth2"]
    - endpoints: ["branch1-ce1:eth1", "hub-pe1:eth3"]
    - endpoints: ["branch2-ce1:eth1", "hub-pe1:eth4"]
    - endpoints: ["branch3-ce1:eth1", "hub-pe1:eth5"]
    - endpoints: ["branch4-ce1:eth1", "dc1-pe1:eth3"]
    - endpoints: ["branch5-ce1:eth1", "dc2-pe1:eth3"]
    - endpoints: ["branch6-ce1:eth1", "hub-pe1:eth6"]

    # ============ HOST-TO-CE LINKS ============
    - endpoints: ["dc1-host:eth1", "dc1-ce1:eth2"]
    - endpoints: ["dc2-host:eth1", "dc2-ce1:eth2"]
    - endpoints: ["hub-host:eth1", "hub-ce1:eth2"]
    - endpoints: ["branch1-host:eth1", "branch1-ce1:eth2"]
    - endpoints: ["branch2-host:eth1", "branch2-ce1:eth2"]
    - endpoints: ["branch3-host:eth1", "branch3-ce1:eth2"]
    - endpoints: ["branch4-host:eth1", "branch4-ce1:eth2"]
    - endpoints: ["branch5-host:eth1", "branch5-ce1:eth2"]
    - endpoints: ["branch6-host:eth1", "branch6-ce1:eth2"]
