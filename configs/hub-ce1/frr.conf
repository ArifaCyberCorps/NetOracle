  neighbor 10.99.0.1 activate
  neighbor 10.99.0.3 route-reflector-client
  neighbor 10.99.0.3 activate
  neighbor 10.99.0.5 route-reflector-client
  neighbor 10.99.0.5 activate
  neighbor 10.99.0.7 route-reflector-client
  neighbor 10.99.0.7 activate
  neighbor 10.99.0.9 route-reflector-client
  neighbor 10.99.0.9 activate
  neighbor 10.99.0.11 route-reflector-client
  neighbor 10.99.0.11 activate
  neighbor 10.99.0.13 route-reflector-client
  neighbor 10.99.0.13 activate
  neighbor 10.99.0.15 route-reflector-client
