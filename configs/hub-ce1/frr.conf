router bgp 65503
 bgp router-id 10.0.2.3
 timers bgp 60 180
 neighbor 10.1.0.16 remote-as 65000
 neighbor 10.99.0.1 remote-as 65501
 neighbor 10.99.0.3 remote-as 65506
 neighbor 10.99.0.5 remote-as 65507
 neighbor 10.99.0.7 remote-as 65508
 neighbor 10.99.0.9 remote-as 65504
 neighbor 10.99.0.11 remote-as 65502
