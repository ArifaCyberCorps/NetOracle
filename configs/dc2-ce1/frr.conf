!
hostname dc2-ce1
!
interface eth1
 ip address 10.1.0.15/31
!
interface eth2
 ip address 172.16.1.1/24
!
interface lo
 ip address 10.0.1.3/32
!
interface vti101
 ip address 10.99.0.11/31
!
interface vti200
 ip address 10.99.1.0/31
!
router bgp 65502
 bgp router-id 10.0.1.3
 neighbor 10.1.0.14 remote-as 65000
 neighbor 10.99.0.10 remote-as 65503
 neighbor 10.99.1.1 remote-as 65505
 !
 address-family ipv4 unicast
  network 10.0.1.3/32
  network 172.16.1.0/24
  neighbor 10.1.0.14 activate
  neighbor 10.99.0.10 activate
  neighbor 10.99.1.1 activate
 exit-address-family
!
ip route 172.16.1.0/24 eth2
!
line vty
!
