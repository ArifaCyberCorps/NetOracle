!
hostname hub-p1
!
interface eth1
 ip address 10.1.0.3/31
 mpls ldp
!
interface eth2
 ip address 10.1.0.5/31
 mpls ldp
!
interface eth3
 ip address 10.1.0.10/31
 mpls ldp
!
interface lo
 ip address 10.0.2.1/32
!
router ospf
 router-id 10.0.2.1
 network 10.0.2.1/32 area 0.0.0.0
 network 10.1.0.3/31 area 0.0.0.0
 network 10.1.0.5/31 area 0.0.0.0
 network 10.1.0.10/31 area 0.0.0.0
!
mpls ldp
 router-id 10.0.2.1
 transport-address 10.0.2.1
!
line vty
!
