!
hostname branch2-ce1
!
interface eth1
 ip address 10.1.0.21/31
!
interface eth2
 ip address 172.16.4.1/24
!
interface lo
 ip address 10.0.4.1/32
!
interface vti103
 ip address 10.99.0.5/31
!
router bgp 65507
 bgp router-id 10.0.4.1
 neighbor 10.1.0.20 remote-as 65000
 neighbor 10.99.0.4 remote-as 65503
 !
 address-family ipv4 unicast
  network 10.0.4.1/32
  network 172.16.4.0/24
  neighbor 10.1.0.20 activate
  neighbor 10.99.0.4 activate
 exit-address-family
!
ip route 172.16.4.0/24 eth2
!
line vty
!
