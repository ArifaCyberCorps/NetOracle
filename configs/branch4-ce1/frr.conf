!
hostname branch4-ce1
!
interface eth1
 ip address 10.1.0.25/31
!
interface eth2
 ip address 172.16.6.1/24
!
interface lo
 ip address 10.0.6.1/32
!
interface vti105
 ip address 10.99.0.9/31
!
router bgp 65504
 bgp router-id 10.0.6.1
 neighbor 10.1.0.24 remote-as 65000
 neighbor 10.99.0.8 remote-as 65503
 !
 address-family ipv4 unicast
  network 10.0.6.1/32
  network 172.16.6.0/24
  neighbor 10.1.0.24 activate
  neighbor 10.99.0.8 activate
 exit-address-family
!
ip route 172.16.6.0/24 eth2
!
line vty
!
