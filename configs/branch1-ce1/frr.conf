!
hostname branch1-ce1
!
interface eth1
 ip address 10.1.0.19/31
!
interface eth2
 ip address 172.16.3.1/24
!
interface lo
 ip address 10.0.3.1/32
!
interface vti102
 ip address 10.99.0.3/31
!
router bgp 65506
 bgp router-id 10.0.3.1
 neighbor 10.1.0.18 remote-as 65000
 neighbor 10.99.0.2 remote-as 65503
 !
 address-family ipv4 unicast
  network 10.0.3.1/32
  network 172.16.3.0/24
  neighbor 10.1.0.18 activate
  neighbor 10.99.0.2 activate
 exit-address-family
!
ip route 172.16.3.0/24 eth2
!
line vty
!
