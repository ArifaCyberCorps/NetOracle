global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "netoracle-telemetry"
    scrape_interval: 15s
    static_configs:
      - targets: ["telemetry-collector:8000"]
        labels:
          app: "netoracle"
          component: "telemetry"

  - job_name: "netoracle-telegraf"
    scrape_interval: 15s
    static_configs:
      - targets: ["telegraf:9273"]
        labels:
          app: "netoracle"
          component: "telegraf"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          app: "prometheus"

  - job_name: "netoracle-docker"
    scrape_interval: 30s
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          app: "netoracle"
          component: "docker"
